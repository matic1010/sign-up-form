<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Sign Up</title>
  </head>
  <body>
    <aside>
      <div class="logo-container">
        <img class="logo" src="/assets/img/odin-lined.png" alt="Odin Logo" />
        <span class="logo-text">ODIN</span>
      </div>
    </aside>
    <main>
      <section class="hero">
        <p>
          This is not a real online service! You know you need something like
          this in your life to help you realize your deepest dreams. Sign up
          <em>now</em> to get started.
        </p>
        <p>You <em>know</em> you want to.</p>
      </section>
      <form>
        <div class="inputs">
          <h2>Let's do this!</h2>
          <fieldset>
            <div class="form-input">
              <label for="first_name">First name</label>
              <input type="text" id="first_name" name="first_name" />
            </div>
            <div class="form-input">
              <label for="last_name">Last name</label>
              <input type="text" id="last_name" name="last_name" />
            </div>
          </fieldset>
          <fieldset>
            <div class="form-input">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required />
            </div>
            <div class="form-input">
              <label for="phone_number">Phone number</label>
              <input type="text" id="phone_number" name="phone" />
            </div>
          </fieldset>
          <fieldset>
            <div class="form-input">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" required />
            </div>
            <div class="form-input">
              <label for="confirm_password">Confirm Password</label>
              <input
                type="password"
                id="confirm_password"
                name="confirm_password"
                required
              />
            </div>
          </fieldset>
        </div>
        <div class="sign-up-button">
          <button type="submit">Create Account</button>
          <p>Already have an account? <a href="#">Log in</a></p>
        </div>
      </form>
    </main>
  </body>
</html>
